# Directivas nginx adicionales para Plesk (web de resultados M+J).
#
# Pégalas en:
#   Sitios web y dominios > (tu dominio) > Configuración de Apache y nginx
#     > "Directivas nginx adicionales"
#
# Replican el cacheo del antiguo despliegue con Docker. Plesk ya fija el `root`
# al document root, así que aquí afinamos compresión y cabeceras de caché por
# tipo de recurso. (La web no usa rutas de cliente, por lo que NO hace falta
# fallback try_files a index.html.)

# --- Compresión -------------------------------------------------------------
# El grueso del peso son los JSON de datos electorales y los GeoJSON del mapa,
# texto muy comprimible: un JSON de varios MB se queda en unos cientos de KB y
# los ficheros pequeños comprimen ~8x. Comprimir recorta drásticamente el
# tráfico y el tiempo de carga. Plesk suele traer gzip activado; aquí lo fijamos
# de forma explícita para los tipos JSON/GeoJSON y subimos el nivel.
gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_vary on;
gzip_proxied any;
gzip_types
    application/json
    application/geo+json
    application/javascript
    text/css
    image/svg+xml;

# Brotli comprime aún más que gzip (sobre todo el JSON). Descomenta estas líneas
# si tu instalación de Plesk/nginx tiene el módulo `ngx_brotli`.
#brotli on;
#brotli_comp_level 5;
#brotli_min_length 1024;
#brotli_types application/json application/geo+json application/javascript text/css image/svg+xml;

# Assets con hash en el nombre (JS/CSS): cache largo e inmutable.
location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# Datos electorales (index.json, historico.json y el JSON de cada elección):
# tienen nombres fijos, así que el navegador debe revalidar siempre (304 si no
# han cambiado). Al redeplegar con elecciones nuevas, la web las coge al instante.
location /datos/ {
    add_header Cache-Control "no-cache";
}

# Geometrías del mapa (provincias/municipios): cambian rara vez, cache larga.
location /geo/ {
    expires 30d;
    add_header Cache-Control "public";
}
