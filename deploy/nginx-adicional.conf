# Directivas nginx adicionales para Plesk (web de resultados M+J).
#
# Pégalas en:
#   Sitios web y dominios > (tu dominio) > Configuración de Apache y nginx
#     > "Directivas nginx adicionales"
#
# Replican el cacheo del antiguo despliegue con Docker. Plesk ya fija el `root`
# al document root y suele tener gzip activado, así que aquí solo afinamos las
# cabeceras de caché por tipo de recurso. (La web no usa rutas de cliente, por
# lo que NO hace falta fallback try_files a index.html.)

# Assets con hash en el nombre (JS/CSS): cache largo e inmutable.
location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
}

# Datos electorales (index.json, historico.json y el JSON de cada elección):
# tienen nombres fijos, así que el navegador debe revalidar siempre (304 si no
# han cambiado). Al redeplegar con elecciones nuevas, la web las coge al instante.
location /datos/ {
    add_header Cache-Control "no-cache";
}

# Geometrías del mapa (provincias/municipios): cambian rara vez, cache larga.
location /geo/ {
    expires 30d;
    add_header Cache-Control "public";
}
