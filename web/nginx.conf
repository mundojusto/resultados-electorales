server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión (los GeoJSON y JSON comprimen muy bien)
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Assets con hash en el nombre: cache largo e inmutable
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Geometrías y datos: cache moderada
    location ~* \.(geojson|json)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
