server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión (los GeoJSON y JSON comprimen muy bien)
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Assets con hash en el nombre: cache largo e inmutable
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Datos electorales (index.json + JSON de cada elección): se generan en cada
    # build con nombres fijos, así que NO se cachean a ciegas. Con "no-cache" el
    # navegador revalida siempre contra el servidor (304 si no han cambiado), de
    # modo que al redeplegar con elecciones nuevas la web las coge al instante.
    location /datos/ {
        add_header Cache-Control "no-cache";
    }

    # Geometrías del mapa (provincias/municipios): cambian rara vez, cache larga.
    location /geo/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
