# Despliegue de la web de resultados M+J.
#   docker compose up -d --build
# Luego accede por  http://IP-DEL-SERVIDOR:8080
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: resultados-electorales-web
    container_name: resultados-mj
    ports:
      - "8080:80" # host:contenedor — cambia 8080 si ese puerto está ocupado
    restart: unless-stopped
