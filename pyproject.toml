# Configuración de herramientas Python (procesador + validación + CI).
[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = ["web", "resultados-oficiales-procesados", "datos-oficiales"]

[tool.ruff.lint]
# Reglas: errores pyflakes (F), estilo pycodestyle (E/W), imports (I),
# upgrades (UP) y bugbear (B).
select = ["E", "F", "W", "I", "UP", "B"]

[tool.pytest.ini_options]
# Permite importar `procesar_resultados` y `validar_datos` desde herramientas/.
pythonpath = ["herramientas"]
testpaths = ["herramientas/tests"]
