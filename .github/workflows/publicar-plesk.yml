name: Publicar web en Plesk

# La web se CONSTRUYE aquí (GitHub Actions tiene Node) y se publica YA COMPILADA
# en la rama 'plesk-deploy'. Plesk solo sigue esa rama y sirve los ficheros: no
# construye nada (su entorno de despliegue está aislado y no tiene Node).
#
# Se ejecuta:
#  - push a main que toque la web o los datos (fusiones de PR);
#  - al terminar "Procesar resultados oficiales" (los commits de datos los hace
#    GITHUB_TOKEN y NO disparan 'push', por eso usamos workflow_run);
#  - manualmente (workflow_dispatch).
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "resultados-oficiales-procesados/**"
      - ".github/workflows/publicar-plesk.yml"
  workflow_run:
    workflows: ["Procesar resultados oficiales"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publicar-plesk
  cancel-in-progress: true

jobs:
  publicar:
    # En el caso workflow_run, solo si el procesado terminó bien.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # publicamos siempre el estado actual de main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Instalar dependencias
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Publicar build en la rama plesk-deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          src_sha="$(git rev-parse --short HEAD)"
          cd web/dist
          # Rama huérfana de un solo commit: solo contiene la web compilada.
          git init -q -b plesk-deploy
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Publicar build de main ($src_sha)"
          git push -f \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            plesk-deploy
