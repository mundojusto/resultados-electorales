name: Desplegar web (GitHub Pages)

# Despliegue de la app de visualización a GitHub Pages.
# De momento es MANUAL (workflow_dispatch): el hosting está por decidir.
# Para publicar automáticamente al hacer push, descomenta el bloque "push".
on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - "web/**"
  #     - "resultados-oficiales-procesados/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Instalar dependencias
        working-directory: web
        run: npm ci
      - name: Build
        working-directory: web
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
