name: CI

# Comprobaciones automáticas en cada Pull Request (y al hacer push a ramas de
# trabajo). Pensado para usarse como "required status checks" en main, de modo
# que un PR no se pueda fusionar si algo falla.
on:
  pull_request:
  push:
    branches-ignore:
      - main

# Cancela ejecuciones anteriores del mismo PR/rama si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --- Procesador Python: lint + tests + validación de datos -----------------
  python:
    name: Python (lint, tests, datos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r herramientas/requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest

      - name: Validar JSON procesados y GeoJSON
        run: python herramientas/validar_datos.py

  # --- App web: lint + typecheck + tests + build -----------------------------
  web:
    name: Web (lint, typecheck, tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Tests (vitest)
        run: npm test

      - name: Build
        run: npm run build
